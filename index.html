<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>代理终端移动端群管理工作台原型</title>
  <style>
    :root {
      --bg: #eef2f6;
      --panel: #ffffff;
      --line: #dce3ec;
      --text: #172033;
      --muted: #667085;
      --soft: #f6f8fb;
      --primary: #2563eb;
      --primary-soft: #e8f0ff;
      --green: #0f9f6e;
      --green-soft: #e7f7ef;
      --amber: #c98206;
      --amber-soft: #fff3d8;
      --red: #dc3d43;
      --red-soft: #ffe8ea;
      --violet: #7755d9;
      --violet-soft: #f0ecff;
      --teal: #087b83;
      --teal-soft: #e2f6f7;
      --shadow: 0 18px 48px rgba(32, 42, 60, .16);
      --radius: 8px;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      background: radial-gradient(circle at 30% 0%, #f8fbff 0, #eef2f6 42%, #e7edf4 100%);
      color: var(--text);
      letter-spacing: 0;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 22px;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      background: none;
      color: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    .phone {
      width: min(100vw, 410px);
      height: min(100vh - 44px, 884px);
      min-height: 700px;
      border-radius: 34px;
      background: #0c1424;
      padding: 10px;
      box-shadow: var(--shadow);
      position: relative;
    }

    .screen {
      height: 100%;
      border-radius: 26px;
      background: var(--bg);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .statusbar {
      height: 30px;
      padding: 8px 18px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: #121a2a;
      background: var(--panel);
      font-size: 12px;
      font-weight: 700;
      flex: none;
    }

    .statusbar .icons {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .signal {
      width: 17px;
      height: 10px;
      display: inline-grid;
      grid-template-columns: repeat(4, 3px);
      align-items: end;
      gap: 1px;
    }

    .signal i {
      display: block;
      width: 3px;
      background: #141b28;
      border-radius: 2px;
    }

    .signal i:nth-child(1) { height: 4px; }
    .signal i:nth-child(2) { height: 6px; }
    .signal i:nth-child(3) { height: 8px; }
    .signal i:nth-child(4) { height: 10px; }

    .battery {
      width: 22px;
      height: 11px;
      border: 1.5px solid #141b28;
      border-radius: 3px;
      position: relative;
    }

    .battery::before {
      content: "";
      position: absolute;
      right: -4px;
      top: 3px;
      width: 2px;
      height: 4px;
      background: #141b28;
      border-radius: 0 2px 2px 0;
    }

    .battery::after {
      content: "";
      position: absolute;
      left: 2px;
      top: 2px;
      width: 14px;
      height: 5px;
      background: #141b28;
      border-radius: 2px;
    }

    .app-header {
      flex: none;
      background: var(--panel);
      padding: 10px 14px 12px;
      border-bottom: 1px solid var(--line);
      z-index: 10;
    }

    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .title-block {
      min-width: 0;
      flex: 1;
    }

    .eyebrow {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    h1 {
      margin: 1px 0 0;
      font-size: 19px;
      line-height: 1.22;
      letter-spacing: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .back-btn,
    .icon-btn {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      background: var(--panel);
      flex: none;
    }

    .icon-btn.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    .icon {
      width: 17px;
      height: 17px;
      display: inline-block;
      position: relative;
      flex: none;
    }

    .icon.search::before {
      content: "";
      position: absolute;
      width: 9px;
      height: 9px;
      border: 2px solid currentColor;
      border-radius: 50%;
      left: 1px;
      top: 1px;
    }

    .icon.search::after {
      content: "";
      position: absolute;
      width: 7px;
      height: 2px;
      background: currentColor;
      transform: rotate(45deg);
      left: 10px;
      top: 11px;
      border-radius: 2px;
    }

    .icon.chevron-left::before,
    .icon.chevron-right::before,
    .icon.chevron-down::before {
      content: "";
      position: absolute;
      width: 8px;
      height: 8px;
      border-left: 2px solid currentColor;
      border-bottom: 2px solid currentColor;
      border-radius: 1px;
    }

    .icon.chevron-left::before {
      transform: rotate(45deg);
      left: 6px;
      top: 4px;
    }

    .icon.chevron-right::before {
      transform: rotate(225deg);
      left: 2px;
      top: 4px;
    }

    .icon.chevron-down::before {
      transform: rotate(-45deg);
      left: 4px;
      top: 3px;
    }

    .icon.grid::before {
      content: "";
      position: absolute;
      inset: 1px;
      background:
        linear-gradient(currentColor 0 0) 0 0 / 7px 7px,
        linear-gradient(currentColor 0 0) 10px 0 / 7px 7px,
        linear-gradient(currentColor 0 0) 0 10px / 7px 7px,
        linear-gradient(currentColor 0 0) 10px 10px / 7px 7px;
      background-repeat: no-repeat;
      border-radius: 3px;
    }

    .icon.users::before {
      content: "";
      position: absolute;
      left: 6px;
      top: 2px;
      width: 6px;
      height: 6px;
      border: 2px solid currentColor;
      border-radius: 50%;
    }

    .icon.users::after {
      content: "";
      position: absolute;
      left: 2px;
      bottom: 1px;
      width: 13px;
      height: 7px;
      border: 2px solid currentColor;
      border-radius: 8px 8px 2px 2px;
    }

    .icon.group::before {
      content: "";
      position: absolute;
      left: 1px;
      top: 3px;
      width: 15px;
      height: 11px;
      border: 2px solid currentColor;
      border-radius: 5px;
    }

    .icon.group::after {
      content: "";
      position: absolute;
      left: 5px;
      bottom: 0;
      border-width: 5px 4px 0 0;
      border-style: solid;
      border-color: currentColor transparent transparent transparent;
    }

    .icon.user::before {
      content: "";
      position: absolute;
      left: 5px;
      top: 1px;
      width: 7px;
      height: 7px;
      border: 2px solid currentColor;
      border-radius: 50%;
    }

    .icon.user::after {
      content: "";
      position: absolute;
      left: 2px;
      bottom: 1px;
      width: 13px;
      height: 7px;
      border: 2px solid currentColor;
      border-radius: 8px 8px 2px 2px;
    }

    .icon.sync::before {
      content: "";
      position: absolute;
      left: 2px;
      top: 2px;
      width: 12px;
      height: 12px;
      border: 2px solid currentColor;
      border-left-color: transparent;
      border-radius: 50%;
    }

    .icon.sync::after {
      content: "";
      position: absolute;
      right: 0;
      top: 2px;
      border-left: 5px solid currentColor;
      border-top: 4px solid transparent;
      border-bottom: 4px solid transparent;
    }

    .icon.plus::before,
    .icon.plus::after {
      content: "";
      position: absolute;
      background: currentColor;
      border-radius: 2px;
    }

    .icon.plus::before {
      width: 15px;
      height: 2px;
      left: 1px;
      top: 8px;
    }

    .icon.plus::after {
      width: 2px;
      height: 15px;
      left: 8px;
      top: 1px;
    }

    .icon.check::before {
      content: "";
      position: absolute;
      width: 11px;
      height: 6px;
      border-left: 2px solid currentColor;
      border-bottom: 2px solid currentColor;
      transform: rotate(-45deg);
      left: 3px;
      top: 4px;
    }

    .icon.send::before {
      content: "";
      position: absolute;
      left: 1px;
      top: 2px;
      width: 15px;
      height: 13px;
      background: currentColor;
      clip-path: polygon(0 0, 100% 50%, 0 100%, 18% 56%, 54% 50%, 18% 44%);
    }

    .icon.image::before {
      content: "";
      position: absolute;
      inset: 2px;
      border: 2px solid currentColor;
      border-radius: 4px;
    }

    .icon.image::after {
      content: "";
      position: absolute;
      left: 4px;
      bottom: 4px;
      width: 10px;
      height: 7px;
      background: currentColor;
      clip-path: polygon(0 100%, 36% 45%, 55% 70%, 72% 38%, 100% 100%);
    }

    .icon.file::before {
      content: "";
      position: absolute;
      left: 3px;
      top: 1px;
      width: 11px;
      height: 15px;
      border: 2px solid currentColor;
      border-radius: 3px;
    }

    .icon.file::after {
      content: "";
      position: absolute;
      right: 2px;
      top: 1px;
      width: 6px;
      height: 6px;
      border-left: 2px solid currentColor;
      border-bottom: 2px solid currentColor;
      background: var(--panel);
    }

    .icon.mic::before {
      content: "";
      position: absolute;
      left: 5px;
      top: 1px;
      width: 7px;
      height: 11px;
      border: 2px solid currentColor;
      border-radius: 7px;
    }

    .icon.mic::after {
      content: "";
      position: absolute;
      left: 3px;
      bottom: 1px;
      width: 11px;
      height: 8px;
      border-bottom: 2px solid currentColor;
      border-left: 2px solid transparent;
      border-right: 2px solid transparent;
      border-radius: 0 0 9px 9px;
    }

    .icon.alert::before {
      content: "";
      position: absolute;
      left: 1px;
      top: 1px;
      width: 15px;
      height: 15px;
      border-radius: 50%;
      border: 2px solid currentColor;
    }

    .icon.alert::after {
      content: "!";
      position: absolute;
      left: 7px;
      top: 1px;
      font-size: 12px;
      font-weight: 800;
      line-height: 16px;
    }

    .role-switch {
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .select-like {
      min-width: 0;
      flex: 1;
      height: 34px;
      padding: 0 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: #273348;
      background: var(--soft);
      font-size: 13px;
      font-weight: 700;
    }

    .search-box {
      margin-top: 10px;
      height: 38px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 11px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: var(--soft);
      color: var(--muted);
    }

    .search-box input {
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      font-size: 13px;
    }

    .content {
      flex: 1;
      overflow: auto;
      padding: 12px 12px 96px;
      scroll-behavior: smooth;
    }

    .content.no-tabs {
      padding-bottom: 18px;
    }

    .content.with-actions {
      padding-bottom: 164px;
    }

    .content.with-composer {
      padding-bottom: 204px;
    }

    .content::-webkit-scrollbar {
      width: 0;
    }

    .hero {
      padding: 14px;
      border-radius: var(--radius);
      background:
        linear-gradient(135deg, rgba(37, 99, 235, .95), rgba(8, 123, 131, .92)),
        #2563eb;
      color: #fff;
      min-height: 126px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
      position: relative;
    }

    .hero::after {
      content: "";
      position: absolute;
      width: 170px;
      height: 170px;
      border: 1px solid rgba(255, 255, 255, .22);
      border-radius: 50%;
      right: -60px;
      top: -60px;
    }

    .hero-top,
    .hero-bottom {
      position: relative;
      z-index: 1;
    }

    .hero h2 {
      margin: 2px 0 6px;
      font-size: 20px;
      line-height: 1.24;
      letter-spacing: 0;
    }

    .hero p {
      margin: 0;
      font-size: 12px;
      line-height: 1.5;
      color: rgba(255, 255, 255, .84);
    }

    .hero-bottom {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .hero-chip {
      height: 26px;
      padding: 0 8px;
      display: inline-flex;
      align-items: center;
      border: 1px solid rgba(255, 255, 255, .26);
      border-radius: 8px;
      background: rgba(255, 255, 255, .14);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .section {
      margin-top: 14px;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 30px;
      margin-bottom: 7px;
    }

    .section-title {
      font-size: 15px;
      font-weight: 800;
      color: #202a3d;
    }

    .section-action {
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px;
    }

    .metric {
      min-height: 78px;
      padding: 12px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 8px;
    }

    .metric strong {
      font-size: 22px;
      line-height: 1;
      letter-spacing: 0;
    }

    .metric span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.25;
    }

    .metric.accent {
      background: #f7fbff;
      border-color: #cae1ff;
    }

    .quick-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .quick {
      height: 74px;
      padding: 8px 4px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 7px;
      text-align: center;
      position: relative;
    }

    .quick .icon-wrap {
      width: 28px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      background: var(--primary-soft);
      color: var(--primary);
    }

    .quick span {
      font-size: 11px;
      color: #313c52;
      line-height: 1.1;
      white-space: nowrap;
    }

    .quick.disabled {
      color: #98a2b3;
      background: #f7f8fa;
    }

    .quick.disabled .icon-wrap {
      background: #eceff3;
      color: #98a2b3;
    }

    .mini-badge {
      position: absolute;
      right: 5px;
      top: 5px;
      min-width: 24px;
      height: 15px;
      padding: 0 4px;
      border-radius: 5px;
      background: var(--amber-soft);
      color: var(--amber);
      font-size: 9px;
      font-weight: 800;
      line-height: 15px;
    }

    .seg {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }

    .seg::-webkit-scrollbar {
      width: 0;
      height: 0;
    }

    .seg button {
      height: 30px;
      padding: 0 10px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: #4b5870;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .seg button.active {
      color: var(--primary);
      border-color: #b9d1ff;
      background: var(--primary-soft);
    }

    .stack {
      display: grid;
      gap: 9px;
    }

    .card {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
    }

    .card-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .card-title {
      margin: 0;
      font-size: 15px;
      line-height: 1.25;
      font-weight: 800;
      color: #172033;
    }

    .card-sub {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .card-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 3px 7px;
      border-radius: 7px;
      background: #eef1f5;
      color: #4b5870;
      font-size: 11px;
      font-weight: 700;
      line-height: 1.2;
      white-space: nowrap;
    }

    .chip.blue {
      background: var(--primary-soft);
      color: var(--primary);
    }

    .chip.green {
      background: var(--green-soft);
      color: var(--green);
    }

    .chip.amber {
      background: var(--amber-soft);
      color: var(--amber);
    }

    .chip.red {
      background: var(--red-soft);
      color: var(--red);
    }

    .chip.violet {
      background: var(--violet-soft);
      color: var(--violet);
    }

    .chip.teal {
      background: var(--teal-soft);
      color: var(--teal);
    }

    .card-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 11px;
    }

    .card-actions .btn {
      min-width: calc(50% - 4px);
    }

    .btn {
      min-height: 34px;
      padding: 0 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: #2e3a50;
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .btn.primary {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    .btn.green {
      background: var(--green);
      border-color: var(--green);
      color: #fff;
    }

    .btn.danger {
      color: var(--red);
      border-color: #ffc4c8;
      background: var(--red-soft);
    }

    .btn.fill {
      flex: 1;
    }

    .btn:disabled {
      color: #9aa4b2;
      background: #f2f4f7;
      border-color: #e4e7ec;
      cursor: not-allowed;
    }

    .timeline {
      position: relative;
      display: grid;
      gap: 9px;
    }

    .log {
      display: grid;
      grid-template-columns: 8px 1fr;
      gap: 9px;
      align-items: flex-start;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-top: 5px;
      background: var(--primary);
    }

    .log-title {
      font-size: 13px;
      line-height: 1.35;
      font-weight: 800;
    }

    .log-time {
      margin-top: 2px;
      color: var(--muted);
      font-size: 11px;
    }

    .empty {
      padding: 28px 16px;
      border: 1px dashed #cfd8e5;
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .72);
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .detail-hero {
      padding: 14px;
      border-radius: var(--radius);
      background: var(--panel);
      border: 1px solid var(--line);
      display: grid;
      gap: 11px;
    }

    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      color: #fff;
      background: linear-gradient(135deg, #2563eb, #10a6a8);
      flex: none;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px;
    }

    .info-cell {
      padding: 9px;
      border-radius: 8px;
      background: var(--soft);
      min-height: 54px;
    }

    .info-cell span {
      color: var(--muted);
      font-size: 11px;
      display: block;
      line-height: 1.2;
    }

    .info-cell strong {
      display: block;
      margin-top: 5px;
      font-size: 13px;
      line-height: 1.3;
      word-break: break-word;
    }

    .action-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .mini-action {
      height: 62px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: var(--panel);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 6px;
      color: #2f3a4d;

    function canSyncGroup(group) {
      const permissions = role().permissions;
      if (!group) return false;
      if (group.filter === "store") return !!permissions.syncStoreGroup;
      if (group.filter === "live") return !!permissions.syncLiveGroup;
      if (group.filter === "course") return !!permissions.syncCourseGroup;
      return !!permissions.syncStoreGroup;
    }

    function isSyncTaskType(type) {
      return ["待同步", "直播范围变更", "课程范围变更", "黑名单客户", "新客户待加入", "客户待移出"].includes(type);
    }

    function syncDecisionForTask(task) {
      if (!task) return { label: "自动识别", tone: "blue", actionLabel: "查看策略", primary: false };
      if (task.type === "新客户待加入") return { label: "自动同步", tone: "green", actionLabel: "查看记录", primary: false };
      if (["直播范围变更", "课程范围变更"].includes(task.type)) return { label: "分级同步", tone: "blue", actionLabel: "分级处理", primary: true };
      if (["客户待移出", "客户转移", "群主异常", "黑名单客户", "群人数过多"].includes(task.type)) return { label: "待人工确认", tone: "amber", actionLabel: "人工确认", primary: true };
      return { label: "待人工确认", tone: "amber", actionLabel: "确认执行", primary: true };
    }

    function syncDecisionForGroup(group) {
      if (!group) return { label: "自动识别", tone: "blue", desc: "系统自动计算成员差异" };
      if (group.status === "异常" || group.abnormal > 2 || group.customers > 500) return { label: "待人工确认", tone: "amber", desc: "存在群主、异常成员或人数阈值风险" };
      if (group.pending > 0) return { label: group.filter === "store" ? "待人工确认" : "分级同步", tone: group.filter === "store" ? "amber" : "blue", desc: "低风险自动同步，高风险进入待办" };
      return { label: "已自动同步", tone: "green", desc: "来源数据和群成员保持一致" };
    }

    function syncStatsForGroup(group) {
      if (!group) return { auto: 0, manual: 0 };
      const scoped = changesForGroup(group);
      let manual = scoped.filter(item => item.type === "移除" || item.type === "角色变更" || item.reason.includes("黑名单") || item.reason.includes("离职") || item.reason.includes("转移")).length;
      if (group.status === "异常" || group.customers > 500) manual = Math.max(manual, group.pending);
      const auto = Math.max(0, group.pending - manual);
      return { auto, manual };
    }

    function syncRiskForChange(item) {
      if (!item) return { label: "低风险", tone: "green" };
      const manual = item.type === "移除" || item.type === "角色变更" || item.reason.includes("黑名单") || item.reason.includes("离职") || item.reason.includes("转移");
      return manual ? { label: "高风险", tone: "amber" } : { label: "低风险", tone: "green" };
    }

    function canProcessTask(task) {
      if (!task) return false;
      const decision = syncDecisionForTask(task);
      const permissions = role().permissions;
      if (decision.label === "自动同步") return true;
      if (state.role === "clerk") return false;
      if (task.type === "群主异常") return !!permissions.changeOwner;
      if (task.type === "群人数过多") return !!permissions.disableGroup || state.role === "agent";
      if (isSyncTaskType(task.type)) return canSyncGroup(groupById(task.groupId));
      return !!permissions.detail;
    }

    function badgeTone(text) {
      if (["正常", "进行中", "已进门店群", "已成交"].includes(text)) return "green";
      if (["待同步", "待加入", "待加入门店群", "待加入直播群", "新客户待加入", "客户待移出"].includes(text)) return "amber";
      if (["黑名单", "黑名单客户", "群主异常", "群人数过多", "异常", "已离职", "已退群", "不允许入群", "已停用", "同步失败"].includes(text)) return "red";
      if (["已结束"].includes(text)) return "gray";
      if (["自动同步", "已自动同步", "低风险"].includes(text)) return "green";
      if (["自动识别", "分级同步"].includes(text)) return "blue";
      if (["待人工确认", "高风险"].includes(text)) return "amber";
      if (["直播群", "直播客户", "直播范围变更", "角色变更"].includes(text)) return "violet";
      if (["课程群", "课程客户", "课程范围变更"].includes(text)) return "teal";
      if (["售前", "售前咨询"].includes(text)) return "blue";
      if (["售中", "售中互动"].includes(text)) return "violet";
      if (["售后", "售后跟进"].includes(text)) return "teal";
      if (["代理群", "门店群", "门店客户", "新增"].includes(text)) return "blue";
      return "";
    }

    }

      const prev = state.history.pop() || screenMeta[state.screen].nav || "workbench";
      state.screen = prev;
      state.query = "";
      render();
    }

    function setState(patch) {
      Object.assign(state, patch);
      render();
    }

    function showToast(message) {
      state.toast = message;
      const toast = $("toast");
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => {
        toast.classList.remove("show");
      }, 1900);
    }

    function openModal(type, payload = {}) {
      state.modal = { type, payload };
      renderModal();
    }

    function closeModal() {
      state.modal = null;
      renderModal();
    }

    function completeTask(taskId) {
      state.completedTasks.add(taskId);
    }

    function syncGroup(groupId = "g1") {
      const group = groups.find(item => item.id === groupId);
      if (group) {
        const stats = syncStatsForGroup(group);
        group.members += stats.auto;
        group.status = group.filter === "live" ? "进行中" : "正常";
        group.pending = 0;
        group.abnormal = Math.max(0, group.abnormal - 1);
        group.lastSync = "刚刚";
      }
      tasks
        .filter(task => task.groupId === groupId && isSyncTaskType(task.type))
        .forEach(task => completeTask(task.id));
      closeModal();
      render();
      showToast("低风险已自动同步，人工确认项已执行");
    }

    function ackAutoTask(taskId) {
      completeTask(taskId);
      closeModal();
      render();
      showToast("自动同步记录已确认");
    }

    function escalateTask(taskId) {
      state.escalatedTasks.add(taskId);
      closeModal();
      render();
      showToast("已提交给上级处理");
    }

    function handleException(taskId) {
      const task = tasks.find(item => item.id === taskId);
      const group = task?.groupId ? groupById(task.groupId) : null;
      if (group && task.type === "群主异常") {
        group.owner = defaultOwnerForGroup(group);
        group.status = group.pending > 0 ? "待同步" : "正常";
        group.abnormal = Math.max(0, group.abnormal - 1);
      }
      if (group && task.type === "群人数过多") {
        group.status = "正常";
      }
      if (group && task.type === "客户转移") {
        group.pending = Math.max(0, group.pending - 2);
      }
      completeTask(taskId);
      closeModal();
      render();
      showToast(task?.type === "群主异常" ? "群主异常已处理，群状态已更新" : "异常已处理并写入记录");
    }

    function defaultOwnerForGroup(group) {
      if (group.filter === "live") return "主播小李";
      if (group.filter === "course") return "课程负责人张三";
      if (group.filter === "agentGroup") return "华南代理负责人";
      return group.source.includes("福田") ? "新任王店长" : "王店长";
    }

    function sendChatMessage(text) {
      const input = $("chatInput");
      const value = (text || input?.value || "").trim();
      if (!value) {
        showToast("先输入要发送的内容");
        return;
      }
      chatMessages.push({
        groupId: state.groupId,
        from: role().label,
        role: "我",
        text: value,
        time: "刚刚",
        mine: true
      });
      state.chatDraft = "";
      render();
      showToast("消息已发送");
    }

    function sendQuickReply(index) {
      sendChatMessage(quickReplies[index]);
    }

    function sendMediaMessage(attachmentType, payload = {}) {
      chatMessages.push({
        groupId: state.groupId,
        from: role().label,
        role: "我",
        attachmentType,
        text: payload.text || "",
        fileName: payload.fileName || "",
        fileSize: payload.fileSize || "",
        imageUrl: payload.imageUrl || "",
        duration: payload.duration || 8,
        time: "刚刚",
        mine: true
      });
      render();
      showToast(attachmentType === "image" ? "照片已发送" : attachmentType === "file" ? "文件已发送" : "语音已发送");
    }

    function triggerAttachmentInput(id) {
      const input = $(id);
      if (input) input.click();
    }

    function handleAttachmentSelect(type, event) {
      const file = event.target.files && event.target.files[0];
      if (!file) return;
      const payload = { fileName: file.name, fileSize: formatFileSize(file.size) };
      if (type === "image" && window.FileReader) {
        const reader = new FileReader();
        reader.onload = () => sendMediaMessage("image", { ...payload, imageUrl: reader.result });
        reader.readAsDataURL(file);
      } else {
        sendMediaMessage(type, payload);
      }
      event.target.value = "";
    }

    function sendVoiceMessage(duration = 8) {
      closeModal();
      sendMediaMessage("voice", { duration });
    }

    function formatFileSize(bytes) {
      if (!Number.isFinite(bytes)) return "";
      if (bytes < 1024) return `${bytes} B`;
      if (bytes < 1024 * 1024) return `${Math.round(bytes / 1024)} KB`;
      return `${(bytes / 1024 / 1024).toFixed(1)} MB`;
    }

    function renderChatMessage(message) {
      if (message.type === "system") {
        return `
          <div class="message system">
            <span class="bubble">${escapeHtml(message.text)}</span>
            <div class="message-time">${message.time}</div>
          </div>
        `;
      }
      const avatar = `<div class="message-avatar">${escapeHtml((message.from || "我").slice(0, 1))}</div>`;
      const body = `
        <div class="message-body">
          <div class="message-name">${escapeHtml(message.from)} · ${escapeHtml(message.role || "成员")}</div>
          ${renderMessageContent(message)}
          <div class="message-time">${message.time}</div>
        </div>
      `;
      return `<div class="message ${message.mine ? "mine" : ""}">${message.mine ? `${body}${avatar}` : `${avatar}${body}`}</div>`;
    }

    function renderMessageContent(message) {
      if (message.attachmentType === "image") {
        return `
          <div class="media-image">
            ${message.imageUrl ? `<img src="${escapeHtml(message.imageUrl)}" alt="${escapeHtml(message.fileName || "群照片")}">` : `<div class="media-image-placeholder">${icon("image")} 照片</div>`}
            <div class="media-caption">${escapeHtml(message.text || message.fileName || "照片")}</div>
          </div>
        `;
      }
      if (message.attachmentType === "file") {
        return `
          <div class="file-message">
            <span class="media-icon">${icon("file")}</span>
            <div class="file-main">
              <div class="file-name">${escapeHtml(message.fileName || "群文件")}</div>
              <div class="file-size">${escapeHtml(message.fileSize || "文件")}</div>
            </div>
          </div>
        `;
      }
      if (message.attachmentType === "voice") {
        return `
          <div class="voice-message">
            <span class="media-icon">${icon("mic")}</span>
            <div class="voice-main">
              <div class="voice-bars"><i></i><i></i><i></i><i></i><i></i></div>
              <div class="voice-duration">${Number(message.duration || 8)} 秒</div>
            </div>
          </div>
        `;
      }
      return `<div class="bubble">${escapeHtml(message.text || "")}</div>`;
    }

        modal.classList.remove("show");
        modal.innerHTML = "";
        return;
      }
      const { type, payload } = state.modal;
      modal.classList.add("show");
      const map = {
        role: renderRoleSheet,
        org: renderOrgSheet,
        sync: () => renderSyncSheet(payload.groupId || "g1"),
        autoRecord: () => renderAutoRecordSheet(payload.taskId),
        source: () => renderSourceSheet(payload.groupId || state.groupId),
        owner: () => renderOwnerSheet(payload.groupId || state.groupId),
        disable: () => renderDisableSheet(payload.groupId),
        voice: renderVoiceSheet,
        escalate: () => renderEscalateSheet(payload.taskId),
        exception: () => renderExceptionSheet(payload.taskId)
      };
      modal.innerHTML = map[type]();
      modal.onclick = (event) => {
        if (event.target === modal) closeModal();
      };
    }

    function changesForGroup(group) {
      if (!group) return changes;
      return changes.filter(item => item.groupId === group.id);
    }

    function customersForGroup(group) {
      if (!group) return [];
      return availableCustomers().filter(customer => {
        if (customer.groups.includes(group.id)) return true;
        if (group.filter === "store" && customer.store === group.source && customer.groupStatus.includes("待加入")) return true;
        if (group.filter === "live" && customer.segment.includes("live")) return true;
        if (group.filter === "course" && customer.segment.includes("course")) return true;
        return false;
      }).slice(0, 6);
    }

    function availableCustomers() {
      if (state.role === "agent") return customers.filter(customer => customer.segment.includes("agent"));
      if (state.role === "clerk") return customers.filter(customer => customer.segment.includes("mine"));
      if (state.role === "anchor") return customers.filter(customer => customer.segment.includes("live"));
      if (state.role === "course") return customers.filter(customer => customer.segment.includes("course"));
      return customers;
    }

    function availableGroups() {
      if (state.role === "agent") return groups;
      if (state.role === "clerk") return groups.filter(group => ["g1", "g2", "g4"].includes(group.id));
      if (state.role === "anchor") return groups.filter(group => group.filter === "live");
      if (state.role === "course") return groups.filter(group => group.filter === "course");
      if (state.role === "manager") return groups.filter(group => ["g1", "g2", "g4"].includes(group.id));
      return groups;
    }

      if (state.role === "course") return [["mine", "我的群"], ["course", "课程群"]];
      return [["mine", "我的群"], ["store", "门店群"], ["live", "直播群"], ["course", "课程群"]];
    }

    function matchesQuery(item) {
      if (!state.query.trim()) return true;
      const q = state.query.trim().toLowerCase();
      return Object.values(item).join(" ").toLowerCase().includes(q);

    function renderAnnotationMarkdown(markdown) {
      const lines = markdown.split("\n");
      let html = "";
      let listStack = [];
      const closeOne = () => {
        const current = listStack.pop();
        if (current) html += `</${current.type}>`;
      };
      const closeAll = () => {
        while (listStack.length) closeOne();
      };
      const inline = (text) => escapeHtml(text)
        .replace(/\[green\]/g, '<span class="prd-dot green"></span>')
        .replace(/\[red\]/g, '<span class="prd-dot red"></span>')
        .replace(/\[amber\]/g, '<span class="prd-dot amber"></span>')
        .replace(/\[blue\]/g, '<span class="prd-dot blue"></span>')
        .replace(/\[violet\]/g, '<span class="prd-dot violet"></span>')
        .replace(/\[teal\]/g, '<span class="prd-dot teal"></span>')
        .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
        .replace(/(^|[^\*])\*(?!\*)([^*]+?)\*(?!\*)/g, "$1<em>$2</em>");
      const adjustList = (indent, type) => {
        while (listStack.length && listStack[listStack.length - 1].indent > indent) closeOne();
        const current = listStack[listStack.length - 1];
        if (!current || current.indent < indent || current.type !== type) {
          if (current && current.indent === indent && current.type !== type) closeOne();
          html += `<${type}>`;
          listStack.push({ indent, type });
        }
      };
      lines.forEach(rawLine => {
        const line = rawLine.replace(/\s+$/g, "");
        if (!line.trim()) {
          closeAll();
          return;
        }
        const heading = line.match(/^#{3,5}\s+(.*)$/);
        if (heading) {
          closeAll();
          html += `<h4>${inline(heading[1])}</h4>`;
          return;
        }
        const quote = line.match(/^>\s?(.*)$/);
        if (quote) {
          closeAll();
          html += `<blockquote>${inline(quote[1])}</blockquote>`;
          return;
        }
        const list = line.match(/^(\s*)([-*]|\d+\.)\s+(.*)$/);
        if (list) {
          const indent = Math.floor(list[1].length / 2);
          const type = /\d+\./.test(list[2]) ? "ol" : "ul";
          adjustList(indent, type);
          html += `<li>${inline(list[3])}</li>`;
          return;
        }
        closeAll();
        html += `<p>${inline(line.trim())}</p>`;
      });
      closeAll();
      return html;
    }

    function byText(selector, text, root = document) {
      return Array.from(root.querySelectorAll(selector)).find(el => el.textContent.includes(text)) || null;
    }

    function sectionByTitle(text) {
      const title = byText(".section-title", text);
      return title?.closest(".section") || title;
    }

    function cardByText(text) {
      return byText(".card, .detail-hero, .chat-context, .row-list, .action-row, .quick-grid, .org-tree", text);
    }

    function modalSheet() {
      return document.querySelector(".modal-backdrop.show .sheet");
    }

    function resolveAnnotationTarget(annotation) {
      if (state.modal) {
        const sheetEl = modalSheet();
        if (!sheetEl || !annotation.modalTypes?.includes(state.modal.type)) return null;
        return sheetEl.querySelector(".sheet-head") || sheetEl;
      }
      switch (annotation.id) {
        case 1:
          return document.querySelector(".hero") || $("appHeader");
        case 2:
          return state.screen === "profile" ? sectionByTitle("我的权限") : byText(".role-switch, .header-row", role().label) || $("appHeader");
        case 3:
          return $("bottomNav");
        case 4:
          return sectionByTitle("数据概览");
        case 5:
          return sectionByTitle("快捷操作");
        case 6:
          return sectionByTitle("同步策略") || sectionByTitle("成员同步策略") || sectionByTitle("分级处理");
        case 7:
          return sectionByTitle("待处理任务");
        case 8:
          return state.screen === "groups" ? document.querySelector("#appContent .section") || sectionByTitle("我的群") : null;
        case 9:
          return state.screen === "groupDetail" ? document.querySelector(".detail-hero") : null;
        case 10:
          return sectionByTitle("成员同步策略") || sectionByTitle("分级处理") || cardByText("成员待同步");
        case 11:
          return sectionByTitle("我的组织") || sectionByTitle("组织来源") || cardByText("后台主体");
        case 12:
          return state.screen === "groupDetail" && groupById(state.groupId)?.filter === "store"
            ? document.querySelector(".detail-hero")
            : cardByText("门店群") || cardByText("南山门店客户群");
        case 13:
          return sectionByTitle("直播服务链路") || sectionByTitle("直播沟通阶段") || cardByText("直播群") || cardByText("五一租赁专场直播群");
        case 14:
          return state.screen === "groupDetail" && groupById(state.groupId)?.filter === "course"
            ? document.querySelector(".detail-hero")
            : cardByText("课程群") || cardByText("设备租赁使用课程群");
        case 15:
          return state.screen === "customerDetail" ? document.querySelector(".detail-hero") : sectionByTitle("全部客户") || sectionByTitle("我的客户") || sectionByTitle("门店客户");
        case 16:
          return state.screen === "chat" ? $("floatingActions") || sectionByTitle("快捷话术") : null;
        case 17:
          return sectionByTitle("快捷操作") || cardByText("更换群主");
        case 18:
          return sectionByTitle("业务闭环") || sectionByTitle("生成规则") || sectionByTitle("操作日志") || document.querySelector(".detail-hero");
        default:
          return null;
      }
    }

    function shouldShowAnnotation(annotation) {
      if (state.modal) return annotation.modalTypes?.includes(state.modal.type);
      return annotation.screens.includes(state.screen);
    }

    function targetIsVisible(target) {
      const rect = target.getBoundingClientRect();
      const screen = document.querySelector(".screen")?.getBoundingClientRect();
      if (!rect.width || !rect.height || !screen) return false;
      return rect.bottom >= screen.top
        && rect.top <= screen.bottom
        && rect.right >= screen.left
        && rect.left <= screen.right;
    }

    function positionAnnotationBadge(badge, target) {
      const rect = target.getBoundingClientRect();
      if (!rect.width && !rect.height) return;
      const scrollX = window.scrollX || window.pageXOffset || 0;
      const scrollY = window.scrollY || window.pageYOffset || 0;
      const width = badge.offsetWidth || 16;
      badge.style.top = `${rect.top + scrollY - 8}px`;
      badge.style.left = `${rect.right + scrollX - width - 4}px`;
    }

    function positionAnnotationTooltip(badge, tooltip) {
      if (tooltip.dataset.dragged === "true") return;
      const rect = badge.getBoundingClientRect();
      const scrollX = window.scrollX || window.pageXOffset || 0;
      const scrollY = window.scrollY || window.pageYOffset || 0;
      const width = tooltip.offsetWidth || 450;
      const height = tooltip.offsetHeight || 360;
      let left = rect.left + scrollX - width - 8;
      let top = rect.bottom + scrollY + 8;
      if (left < scrollX + 8) left = rect.right + scrollX + 8;
      if (left + width > scrollX + window.innerWidth - 8) left = scrollX + window.innerWidth - width - 8;
      if (top + height > scrollY + window.innerHeight - 8) top = rect.top + scrollY - height - 8;
      if (top < scrollY + 8) top = scrollY + 8;
      tooltip.style.left = `${Math.max(scrollX + 8, left)}px`;
      tooltip.style.top = `${Math.max(scrollY + 8, top)}px`;
    }

    function makeAnnotationDraggable(tooltip) {
      const handle = tooltip.querySelector(".prd-anno-head");
      let drag = null;
      handle.addEventListener("mousedown", (event) => {
        if (event.target.closest(".prd-anno-close")) return;
        event.preventDefault();
        event.stopPropagation();
        const rect = tooltip.getBoundingClientRect();
        drag = {
          x: event.clientX,
          y: event.clientY,
          left: rect.left + (window.scrollX || window.pageXOffset || 0),
          top: rect.top + (window.scrollY || window.pageYOffset || 0)
        };
        tooltip.dataset.dragged = "true";
      });
      document.addEventListener("mousemove", (event) => {
        if (!drag) return;
        event.preventDefault();
        const scrollX = window.scrollX || window.pageXOffset || 0;
        const scrollY = window.scrollY || window.pageYOffset || 0;
        const nextLeft = drag.left + event.clientX - drag.x;
        const nextTop = drag.top + event.clientY - drag.y;
        tooltip.style.left = `${Math.max(scrollX + 8, nextLeft)}px`;
        tooltip.style.top = `${Math.max(scrollY + 8, nextTop)}px`;
      });
      document.addEventListener("mouseup", () => {
        drag = null;
      });
    }

    function openAnnotationTooltip(annotation, badge) {
      let tooltip = document.querySelector(`.prd-anno-tooltip[data-anno-id="${annotation.id}"]`);
      if (!tooltip) {
        tooltip = document.createElement("div");
        tooltip.className = "prd-anno-tooltip";
        tooltip.dataset.annoId = annotation.id;
        tooltip.innerHTML = `
          <div class="prd-anno-head">
            <div class="prd-anno-title">
              <span class="prd-anno-badge">${annotation.id}</span>
              <span class="prd-anno-title-text">需求描述：${escapeHtml(annotation.title)}</span>
            </div>
            <button class="prd-anno-close" aria-label="关闭">X</button>
          </div>
          <div class="prd-anno-body">${renderAnnotationMarkdown(annotation.md)}</div>
        `;
        tooltip.addEventListener("click", event => event.stopPropagation());
        tooltip.addEventListener("mousedown", event => event.stopPropagation());
        tooltip.querySelector(".prd-anno-close").addEventListener("click", (event) => {
          event.stopPropagation();
          tooltip.remove();
        });
        makeAnnotationDraggable(tooltip);
        document.body.appendChild(tooltip);
      }
      positionAnnotationTooltip(badge, tooltip);
    }

    function renderAnnotations() {
      document.querySelectorAll(".prd-anno-badge[data-anno-anchor='true']").forEach(item => item.remove());
      prdAnnotations.filter(shouldShowAnnotation).forEach(annotation => {
        const target = resolveAnnotationTarget(annotation);
        if (!target || !targetIsVisible(target)) return;
        const badge = document.createElement("span");
        badge.className = "prd-anno-badge";
        badge.dataset.annoAnchor = "true";
        badge.dataset.annoId = annotation.id;
        badge.textContent = annotation.id;
        badge.addEventListener("mouseenter", (event) => {
          event.stopPropagation();
          openAnnotationTooltip(annotation, badge);
        });
        badge.addEventListener("click", (event) => {
          event.stopPropagation();
          openAnnotationTooltip(annotation, badge);
        });
        document.body.appendChild(badge);
        positionAnnotationBadge(badge, target);
        const tooltip = document.querySelector(`.prd-anno-tooltip[data-anno-id="${annotation.id}"]`);
        if (tooltip) positionAnnotationTooltip(badge, tooltip);
      });
    }

    function render() {
      renderHeader();
      renderBottomNav();
      renderContent();
      renderFloatingActions();
      renderModal();
      renderAnnotations();
    }

    window.addEventListener("resize", renderAnnotations);
    document.addEventListener("scroll", renderAnnotations, true);

    render();
  </script>

            <span class="im-search-icon"></span>
            <input id="${id}" value="${esc(value)}" placeholder="${esc(placeholder)}" autocomplete="off">
            ${value ? `<button class="im-clear" data-action="clearInput" data-field="${id}">×</button>` : ""}
          </div>
        `;
      }

      function bottomNav() {
        return `
          <nav class="im-bottom">
            <button class="im-nav" data-action="navToast"><span class="nav-mark">▥</span><span>学习</span></button>
            <button class="im-nav" data-action="navToast"><span class="nav-mark">▷</span><span>发现</span></button>
            <button class="im-nav active" data-action="contacts"><span class="nav-mark">▣</span><span>消息</span></button>
            <button class="im-nav" data-action="navToast"><span class="nav-mark">◉</span><span>我的</span></button>
          </nav>
        `;
      }

      function addMenu() {
        return `
          <div class="im-menu">
            <button data-action="addFriend"><span class="im-mini-icon">⌘</span>添加好友</button>
            <button data-action="groups"><span class="im-mini-icon">☷</span>创建群聊</button>
          </div>
        `;
      }

      function renderContacts() {
        const grouped = contacts.reduce((map, item) => {
          map[item.letter] = map[item.letter] || [];
          map[item.letter].push(item);
          return map;
        }, {});
        return `
          ${head("通讯录", {
            tint: true,
            tabs: true,
            add: "toggleAdd",
            search: `<button class="im-search-row" data-action="search">${searchBox({ placeholder: "请输入您要搜索的关键字", value: "", id: "fakeSearch", gray: true })}</button>`
          })}
          <main class="im-content">
            <div class="im-list">
              <button class="im-row compact" data-action="newFriends">
                <span class="im-avatar friend">友</span>
                <span class="im-row-main"><span class="im-row-title">新的朋友</span></span>
                <span class="im-dot-badge">9</span>
              </button>
              <button class="im-row compact" data-action="groups">
                <span class="im-avatar group">群</span>
                <span class="im-row-main"><span class="im-row-title">我的群聊</span></span>
              </button>
              ${Object.keys(grouped).map(letter => `
                <div class="im-section-letter">${letter}</div>
                ${grouped[letter].map(item => `
                  <button class="im-row" data-action="friendDetail">
                    ${avatar(item)}
                    <span class="im-row-main"><span class="im-row-title">${esc(item.name)}</span></span>
                  </button>
                `).join("")}
              `).join("")}
            </div>
          </main>
          <div class="im-alpha">${"ABCDEFGHIJKLMNOPQRSTUVWXYZ#".split("").map(ch => `<span class="${ch === "C" ? "active" : ""}">${ch}</span>`).join("")}</div>
          ${bottomNav()}
        `;
      }

      function renderSearch() {
        const q = state.searchQuery.trim();
        const hasResult = q.length > 0;
        return `
          ${head("", {
            back: true,
            search: `<div class="im-search-row">${searchBox({ placeholder: "请输入您要搜索的关键字", value: state.searchQuery, id: "searchInput" })}</div>`
          })}
          <main class="im-content">
            ${hasResult ? `
              <div class="im-result-title">联系人</div>
              ${searchContacts.map(item => `
                <button class="im-row compact" data-action="friendDetail">
                  ${avatar(item)}
                  <span class="im-row-main"><span class="im-row-title">${esc(item.name)}</span></span>
                </button>
              `).join("")}
              <button class="im-more-link" data-action="searchMoreContacts">展示更多联系人</button>
              <div class="im-result-title">群聊</div>
              ${groups.map(name => `
                <button class="im-row compact" data-action="groups">
                  <span class="im-avatar group">群</span>
                  <span class="im-row-main"><span class="im-row-title">${esc(name)}</span></span>
                </button>
              `).join("")}
              <button class="im-more-link" data-action="searchMoreGroups">展示更多群</button>
            ` : ""}
          </main>
        `;
      }

      function renderAddFriend() {
        const q = state.addQuery.trim();
        const exists = q === "13033258577" || q === "130 3325 8577" || q === "小";
        return `
          ${head("", {
            back: true,
            search: `<div class="im-search-row">${searchBox({ placeholder: "请输入手机号或昵称", value: state.addQuery, id: "addInput" })}</div>`
          })}
          <main class="im-content">
            ${q && exists ? `
              <button class="im-row no-line" data-action="friendRequest">
                ${avatar({ name: "小世敏", avatar: "dark" })}
                <span class="im-row-main">
                  <span class="im-row-title">小世敏</span>
                  <span class="im-row-sub">广东省广州市天河区<br>130 3325 8577</span>
                </span>
                <span class="im-pill-btn">添加</span>
              </button>
            ` : q.length > 7 ? `
              <div class="im-empty">
                <div class="im-empty-box"></div>
                <div>未搜索到好友</div>
              </div>
            ` : `
              <div class="im-empty">
                <div class="im-empty-box"></div>
                <div>未搜索到好友</div>
              </div>
            `}
          </main>
        `;
      }

      function renderFriendRequest() {
        return `
          ${head("申请添加好友", { back: true })}
          <main class="im-content">
            <div class="im-profile-band">
              ${avatar({ name: "徐世敏", avatar: "pink" }, true)}
              <div>
                <div class="im-profile-name">徐世敏</div>
                <div class="im-profile-line">广东省广州市天河区<br>130 3325 8577</div>
              </div>
            </div>
            <div class="im-label">打招呼内容</div>
            <textarea id="requestText" class="im-textarea" placeholder="请输入打招呼内容">${esc(state.requestText)}</textarea>
            <div class="im-actions">
              <button class="im-pill-btn full" data-action="sendRequest">发送</button>
            </div>
          </main>
        `;
      }

      function renderNewFriends() {
        return `
          ${head("新的朋友", { back: true, addText: "添加朋友", addAction: "addFriend" })}
          <main class="im-content">
            ${newFriends.length ? newFriends.map((item, index) => `
              <button class="im-row" data-action="${index === 0 ? "verifyFriend" : "friendDetail"}">
                ${avatar(item)}
                <span class="im-row-main">
                  <span class="im-row-title">${esc(item.name)}</span>
                  <span class="im-row-sub">${esc(item.sub)}</span>
                </span>
                <span style="color:${item.tone === "green" ? "#22c7a5" : "#a1a8b0"};font-size:13px;font-weight:900;">${esc(item.status)}</span>
              </button>
            `).join("") : `
              <div class="im-empty">
                <div class="im-empty-box"></div>
                <div>暂无新的朋友</div>
              </div>
            `}
          </main>
        `;
      }

      function renderVerifyFriend() {
        return `
          ${head("申请添加好友", { back: true })}
          <main class="im-content">
            <div class="im-profile-band">
              ${avatar({ name: "徐世敏", avatar: "pink" }, true)}
              <div>
                <div class="im-profile-name">徐世敏</div>
                <div class="im-profile-line">地区：广东省广州市天河区<br>电话：130 3325 8577</div>
              </div>
            </div>
            <div class="im-label">打招呼内容</div>
            <div class="im-textarea">哈喽！在超凡摄影群看到你的作品，太喜欢了，想请教下</div>
            <div class="im-actions">
              ${state.friendAccepted ? `<button class="im-pill-btn full light">等待对方验证</button>` : state.friendRejected ? `<button class="im-pill-btn full danger">对方已拒绝</button>` : `
                <button class="im-pill-btn full" data-action="acceptFriend">通过好友申请</button>
                <button class="im-pill-btn full danger" data-action="rejectFriend">拒绝好友申请</button>
              `}
            </div>
          </main>
        `;
      }

      function renderFriendDetail() {
        const withRemark = state.remark !== "徐世敏";
        return `
          ${head("", { back: true, more: "friendSettings" })}
          <main class="im-content">
            <div class="im-detail-head">
              ${avatar({ name: "徐世敏", avatar: "pink" }, true)}
              <div>
                <div class="im-profile-name">徐世敏</div>
                <div class="im-profile-line">${withRemark ? `昵称：快乐加载中<br>` : ""}地区：广东省广州市天河区<br>电话：130 3325 8577</div>
              </div>
            </div>
            <div class="im-detail-card">
              <button class="im-soft-btn" data-action="chat">▣ 发消息</button>
              <button class="im-soft-btn" data-action="callSheet">☎ 语音/视频</button>
            </div>
          </main>
        `;
      }

      function renderFriendSettings() {
        return `
          ${head("朋友设置", { back: true })}
          <main class="im-content im-page soft">
            <div class="im-settings-list">
              <div class="im-settings-card">
                <button class="im-setting-row" data-action="remarkSheet">
                  <span>设置朋友名称</span>
                  <span class="im-setting-value">${esc(state.remark)} ›</span>
                </button>
                <button class="im-setting-row" data-action="toggleBlack">
                  <span>拉黑好友</span>
                  <span class="im-toggle ${state.blacklist ? "on" : ""}"></span>
                </button>
              </div>
              <button class="im-delete" data-action="deleteConfirm">删除好友</button>
            </div>
          </main>
        `;
      }

      function renderChat() {
        return `
          ${head("李臻卓", { back: true, more: "friendSettings" })}
          <main class="im-chat-list">
            <div class="im-chat-time">2025-08-26 13:22</div>
            <div class="im-msg">
              ${avatar({ name: "麻烦", avatar: "orange" })}
              <div class="im-bubble">您好 麻烦简单描述一下你的问题</div>
            </div>
            <div class="im-msg mine">
              <div class="im-bubble">您好</div>
              ${avatar({ name: "我", avatar: "friend" })}
            </div>
          </main>
          <div class="im-composer">
            <div class="im-compose-main">
              <button class="im-round" data-action="voiceToast">)))</button>
              <input id="chatInput" class="im-input" value="${esc(state.chatInput)}" placeholder="请输入..." autocomplete="off">
              <button class="im-round" data-action="emojiToast">☺</button>
              <button class="im-round" data-action="toggleTools">＋</button>
            </div>
            ${state.chatTools ? `
              <div class="im-tool-grid">
                ${[
                  ["▧", "图片"], ["●", "相机"], ["▣", "红包"], ["▤", "直播"],
                  ["☎", "语音通话"], ["▮", "视频通话"]
                ].map(([icon, label]) => `
                  <button class="im-tool" data-action="${label.includes("通话") ? "callSheet" : "toolToast"}" data-label="${label}">
                    <span class="im-tool-icon">${icon}</span>
                    <span>${label}</span>
                  </button>
                `).join("")}
              </div>
            ` : ""}
          </div>
        `;
      }

      function overlays() {
        if (state.sheet === "remark") {
          return `
            <div class="im-overlay">
              <div class="im-sheet">
                <div class="im-sheet-title">修改朋友备注名</div>
                <input id="remarkInput" class="im-sheet-input" value="${esc(state.remarkDraft)}" maxlength="20">
                <div class="im-sheet-actions">
                  <button class="im-sheet-action" data-action="closeSheet">取消</button>
                  <button class="im-sheet-action primary" data-action="saveRemark">确认</button>
                </div>
              </div>
            </div>
          `;
        }
        if (state.sheet === "delete") {
          return `
            <div class="im-overlay" style="align-items:center;">
              <div class="im-confirm">
                <div class="im-confirm-text">请再次确认是否删除好友<br>删除后将同时<strong>删除聊天记录?</strong></div>
                <div class="im-confirm-actions">
                  <button class="im-sheet-action" data-action="closeSheet">取消</button>
                  <button class="im-sheet-action primary" data-action="deleteFriend">确认</button>
                </div>
              </div>
            </div>
          `;
        }
        if (state.sheet === "call") {
          return `
            <div class="im-overlay">
              <div class="im-call-sheet">
                <button class="im-call-option" data-action="callToast">▮ 视频通话</button>
                <button class="im-call-option" data-action="callToast">☎ 语音通话</button>
                <button class="im-call-cancel" data-action="closeSheet">取消</button>
              </div>
            </div>
          `;
        }
        return "";
      }

      function toast() {
        return state.toast ? `<div class="im-toast">${esc(state.toast)}</div>` : "";
      }

      function render() {
        const pages = {
          contacts: renderContacts,
          search: renderSearch,
          addFriend: renderAddFriend,
          friendRequest: renderFriendRequest,
          newFriends: renderNewFriends,
          verifyFriend: renderVerifyFriend,
          friendDetail: renderFriendDetail,
          friendSettings: renderFriendSettings,
          chat: renderChat
        };
        pageEl.className = `im-page ${state.page === "friendSettings" ? "soft" : ""}`;
        pageEl.innerHTML = `${pages[state.page]()}${overlays()}${toast()}`;
        bind();
      }

      function bind() {
        pageEl.querySelectorAll("[data-action]").forEach(el => {
          el.addEventListener("click", (event) => {
            const action = el.dataset.action;
            event.stopPropagation();
            if (action === "back") back();
            if (action === "contacts") route("contacts", { push: false });
            if (action === "search") route("search", { searchQuery: "" });
            if (action === "toggleAdd") { state.addOpen = !state.addOpen; render(); }
            if (action === "addFriend") route("addFriend", { addQuery: "" });
            if (action === "groups") showToast("创建群聊入口已预留");
            if (action === "newFriends") route("newFriends");
            if (action === "friendDetail") route("friendDetail");
            if (action === "friendRequest") route("friendRequest", { requestText: "哈喽！哈喽！久仰大名，冒昧加你，多指教啦～" });
            if (action === "sendRequest") { state.requestSent = true; showToast("✓ 已发送申请"); }
            if (action === "verifyFriend") route("verifyFriend");
            if (action === "acceptFriend") { state.friendAccepted = true; showToast("已通过好友申请"); }
            if (action === "rejectFriend") { state.friendRejected = true; showToast("已拒绝好友申请"); }
            if (action === "friendSettings") route("friendSettings");
            if (action === "chat") route("chat");
            if (action === "callSheet") { state.sheet = "call"; render(); }
            if (action === "remarkSheet") { state.remarkDraft = state.remark; state.sheet = "remark"; render(); }
            if (action === "toggleBlack") { state.blacklist = !state.blacklist; render(); }
            if (action === "deleteConfirm") { state.sheet = "delete"; render(); }
            if (action === "closeSheet") { state.sheet = null; render(); }
            if (action === "saveRemark") {
              const input = document.getElementById("remarkInput");
              const value = (input?.value || "").trim();
              if (value.length < 4 || value.length > 12) {
                showToast("名称长度已超上限，限4-12字");
                return;
              }
              state.remark = value;
              state.sheet = null;
              showToast("备注已更新");
            }
            if (action === "deleteFriend") { state.sheet = null; route("contacts", { push: false }); showToast("好友已删除"); }
            if (action === "toggleTools") { state.chatTools = !state.chatTools; render(); }
            if (action === "toolToast") showToast(`${el.dataset.label}功能已预留`);
            if (action === "voiceToast") showToast("切换语音输入");
            if (action === "emojiToast") showToast("表情面板已预留");
            if (action === "callToast") { state.sheet = null; showToast("正在呼叫..."); }
            if (action === "navToast") showToast("该栏目为外部业务入口");
            if (action === "searchMoreContacts") showToast("已展示全部联系人结果");
            if (action === "searchMoreGroups") showToast("已展示全部群聊结果");
            if (action === "clearInput") {
              const field = el.dataset.field;
              if (field === "searchInput") state.searchQuery = "";
              if (field === "addInput") state.addQuery = "";
              render();
            }
          });
        });
        const searchInput = document.getElementById("searchInput");
        if (searchInput) {
          searchInput.focus();
          searchInput.addEventListener("input", () => {
            state.searchQuery = searchInput.value;
            render();
          });
        }
        const addInput = document.getElementById("addInput");
        if (addInput) {
          addInput.focus();
          addInput.addEventListener("input", () => {
            state.addQuery = addInput.value;
            render();
          });
        }
        const requestText = document.getElementById("requestText");
        if (requestText) {
          requestText.addEventListener("input", () => {
            state.requestText = requestText.value;
          });
        }
        const chatInput = document.getElementById("chatInput");
        if (chatInput) {
          chatInput.addEventListener("input", () => {
            state.chatInput = chatInput.value;
          });
        }
        const remarkInput = document.getElementById("remarkInput");
        if (remarkInput) {
          remarkInput.focus();
          remarkInput.addEventListener("input", () => {
            state.remarkDraft = remarkInput.value;
          });
        }
      }

      render();
    })();
  </script>
</body>
</html>
